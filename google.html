<!DOCTYPE html>
<html lang="en">
<head>
   <style>
      body{
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         height: 100vh;
         gap: 30px;
      }
      img{
         mix-blend-mode: screen;
         border-radius:50%;
         width: 150px;
      }
      input{
         text-align: left;
         border-radius: 25px;
         height: 30px;
         width: 250px;
      }
      .container{
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         gap: 15px;
      }
      button{
         border-radius: 25px;
         border:none;
         transition: background-color 0.3s;
         width: 150px;
         height: 30px;
      }
      button:hover{
         background-color: aquamarine;
      }
      .buttons{
         display:flex;
         gap:20px;
      }
   </style>
   <title>Google.com</title>
</head>
<body>
   <div class="container">
      <img src="/OIP.jpg" title="Google Logo">
      <br>
      <input type="text" placeholder=" 🔍Search"></input>
      <div class="buttons">
         <button>Google Search</button>
         <button>I'm Feeling Lucky</button>
      </div>
   </div>
</body>
</html>
