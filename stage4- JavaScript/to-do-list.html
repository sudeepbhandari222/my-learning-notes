<!DOCTYPE html>
<html lang="en">
<head>
   <style>
      body{
         background-color: rgb(77, 75, 75);
         font-family: Arial, Helvetica, sans-serif;
         text-align: center;
         color: black;
      }
      h1{
         color:rgb(182, 182, 135);
      }
      .text{
         display: flex;
         justify-content: center;
         align-items: center;
         margin:20px 10px 30px;
      }
      input{
         border: none;
         border-radius: 25px;
         width: 200px;
         text-align: center;
         height: 30px;
      }
      #butt{
         border: none;
         border-radius: 50%;
         width:50px;
         height:45px;
         background-color: rgb(166, 243, 166);
         transition: 0.3s;
      }
      #butt:hover{
         background-color: rgb(65, 148, 65);
         cursor:pointer;
      }
      ul{
         text-align: left;
      }
      .del{
         background-color: blanchedalmond;
         border-radius: 50%;
         border:none;
         width:50px;
         height:45px;
         transition: background-color 0.3s;
      }
      .del:hover{
         background-color: brown;
         cursor:pointer;
      }
   </style>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>To Do List</title>
</head>
<body>
   <script>
      function add(){
         let task = document.getElementById("myList").value;
         let li = document.createElement("li");
         li.innerText = task;
         let btn = document.createElement("button");
         btn.innerText= "Delete";
         btn.className="del";
         btn.onclick = function(){li.remove();}
         li.appendChild(btn);
         document.getElementById("list").appendChild(li);
      }
   </script>
   <h1>My To-Do List</h1>
   <div class="text">
      <form >
         <input id="myList" type="text" placeholder="Enter Your Task" >
      </form>
      <button id="butt" onclick="add()">Add</button>
   </div>
   <ul id="list"></ul>
</body>
</html>
