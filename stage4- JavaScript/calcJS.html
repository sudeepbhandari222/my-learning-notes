<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
      body{
         background-color: beige;
         text-align: center;
         font-family: Arial, Helvetica, sans-serif;
         color: white;
      }
      h1{
         background-color: rgb(68, 67, 67);
      }
      hr{
         background-color: black;
         height: 3px;
      }
      input{
         border-radius: 25px;
         border:none;
         width: 250px;
         height:40px;
         text-align: center;
      }
      button{
         border:none;
         border-radius: 50%;
         width: 55px;
         height:50px;
         background-color: orange;
         transition: background-color 0.3s;
      }
      button:hover{
         cursor:pointer;
         background-color: orangered;
      }
      #result{
         color: rgb(105, 6, 100);
      }
   </style>
   <title>Calculator</title>
</head>
<body>
   <script>
      function addition(){
         let A = Number(document.getElementById("number1").value);
      let B = Number(document.getElementById("number2").value);
         X = A + B
         document.getElementById("result").innerText = "Answer: "+ X;
      }
      function subtract(){
         let A = Number(document.getElementById("number1").value);
      let B = Number(document.getElementById("number2").value);
         X = A - B
         document.getElementById("result").innerText = "Answer: "+ X;
      }
      function multiply(){
         let A = Number(document.getElementById("number1").value);
      let B = Number(document.getElementById("number2").value);
         X = A * B
         document.getElementById("result").innerText = "Answer: "+ X;
      }
      function division(){
         let A = Number(document.getElementById("number1").value);
      let B = Number(document.getElementById("number2").value);
      if(B==0){
         document.getElementById("result").innerText = "Cannot be divided by zero";
      }else{
         X = A / B
         document.getElementById("result").innerText = "Answer: "+ X;
         }
      }
   </script>
   <h1>Calculator</h1>
   <hr>
   <input type="number" id="number1" placeholder="First Number">
   <input type="number" id="number2" placeholder="Second Number">
   <hr>
   <button class="operate" onclick="addition()">Add</button>
   <button class="operate" onclick="subtract()">Sub</button>
   <button class="operate" onclick="multiply()">Mult</button>
   <button class="operate" onclick="division()">Div</button>
   <hr>
   <p id="result"></p>
</body>
</html>
