<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ButtonSlide</title>
   <style>
      body{
         background: #504c4c;
      }
      .butt{
         text-align: center;
         position: relative;
         border: none;
         border-radius: 25px;
         height: 70px;
         width: 300px;
         background-color: aliceblue;
         overflow: hidden;
         transition: all 0.6s cubic-bezier(0.2,1,0.2,1);
      }
      .hover{
         border: none;
         position: absolute;
         background: rgb(80, 164, 175);
         height: 100%;
         width: 100%;
         border-radius: 30px;
         right: 110%;
         transition: 0.34s cubic-bezier(0.8,0.76,0.8,0.76);
         opacity: 0.2;
      }
      .butt:hover .hover{
         right:0;
         opacity: 1;
         border-radius: 25px;
         cursor: pointer;
      }
   </style>
</head>
<body>
   <div class="butt">
      <div class="hover"></div>
      <h3>Click Me</h3>
   </div>
</body>
</html>
